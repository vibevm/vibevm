<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>vibeterm</title>
    <link rel="icon" type="image/svg+xml" href="resources/icon.svg" />
    <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #191724;
        /* The window never scrolls — the grid is fit to it. Without this, a
           sub-pixel fit mismatch on resize pops window scrollbars (and a
           terminal never scrolls horizontally at all). xterm's own scrollback
           viewport is a separate element and is unaffected. */
        overflow: hidden;
      }
      #term {
        height: 100%;
        overflow: hidden;
      }
      /* The inner padding lives on `.xterm`, NOT `#term`. FitAddon measures
         `terminal.element.parentElement` (= #term) and subtracts `.xterm`'s own
         horizontal padding (plus the scrollbar width) before dividing by the
         cell width. With the padding on #term it was invisible to that math, so
         the fitted column count was one too large and the last column's glyphs
         drew under the scrollbar. On `.xterm` the padding is correctly deducted. */
      .xterm {
        height: 100%;
        padding: 4px;
        box-sizing: border-box;
      }
      /* General-purpose terminal scrolling, no hardcoded sizes:
         - The window itself never scrolls (overflow:hidden above); the grid is
           fit to it, so no browser scrollbars.
         - xterm keeps its scrollback scrollbar so a shell scrolls normally. We
           only reserve its GUTTER (`scrollbar-gutter: stable`) so the grid width
           always excludes the bar — the bar sits beside the grid, never under a
           full-width row highlight. The gutter is whatever width the OS scrollbar
           is (`scrollbar-width: thin` asks for the slim one) — never a fixed px,
           so any DPI / font size works. In a full-screen TUI (alt-screen) there
           is no scrollback, so no bar shows; the reserved gutter keeps layout
           stable when a program flips in and out of alt-screen. */
      .xterm-viewport {
        scrollbar-gutter: stable;
        scrollbar-width: thin;
      }
      /* The scrollbar policy lives in renderer.js (`window.setScrollbarMode`,
         driven by `POST /scrollbar`): `auto` hides the bar for a full-screen
         TUI (alt-screen, no scrollback) and shows it for a shell; `on`/`off`
         force it. When the bar is hidden the body carries `.scrollbar-hidden`
         and these rules suppress xterm's scrollback viewport entirely. */
      body.scrollbar-hidden .xterm-viewport {
        overflow: hidden;
        scrollbar-gutter: auto;
        scrollbar-width: none; /* Firefox */
      }
      body.scrollbar-hidden .xterm-viewport::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none; /* Chromium / Electron */
      }
    </style>
  </head>
  <body>
    <div id="term"></div>
    <script src="renderer.js"></script>
  </body>
</html>
