# conform.toml — this project's AI-Native discipline policy
# (ENGINE-CONFORM; generated by `go-ai-native init`, then owned by you).
#
# The [go] table drives the go-extract structural gate
# (`go-ai-native-conform`): the §2/§5/§7 ban census, cell isolation over
# import paths, and the file-length budget. Rust-side keys stay at
# their defaults until Rust code joins the tree.

roots = []
max_file_lines = 600

[go]
roots = ["."]
exclude_substrings = ["/testdata/", "/vendor/"]
cells_dir = "internal/cells"
seams_pkg = "internal/seams"
registry_pkg = "internal/registry"
