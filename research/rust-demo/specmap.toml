# specmap.toml — this project's traceability policy
# (PROP-014; generated by `rust-ai-native init`, then owned by you).

# The spec:// namespace this project's units are minted under.
namespace = "rust-demo"

# Code roots scanned for tags: crate dirs, named explicitly (the
# scanner walks each crate's src/ + tests/).
scan_roots = ["crates/rust-demo"]
spec_roots = ["spec"]
root_spec_docs = []
exempt = []
dispositioned = []

# Installed packages' spec trees, read for URI RESOLUTION only
# (PROP-014 §7.1) — discovered from vibedeps/ at init time.
[[external_specs]]
namespace = "core-ai-native"
root = "vibedeps/flow-core-ai-native/0.7.0/spec"

[[external_specs]]
namespace = "rust-ai-native-lang"
root = "vibedeps/stack-rust-ai-native-lang/0.7.0/spec"

