# conform.toml — this project's AI-Native discipline policy
# (ENGINE-CONFORM; generated by `rust-ai-native init`, then owned by you).
#
# The gate enforces only what this file gates. Crates start EXEMPT and
# flip into `gated_crates` one by one, each after its violations drain
# to zero (expand-as-you-conform — a flip must never widen a baseline).

roots = ["crates/*"]
exclude_substrings = ["/generated/"]
max_file_lines = 600
# Born conformant: the demo entered the gate on day one (the
# expand-as-you-conform flip happened at zero findings — there was
# nothing to drain). The crates/ layout is deliberate: the tree
# invariant cannot yet name a gated crate under a bare `.` root (a
# recorded core-ai-native defect; see the repo Cargo.toml note).
gated_crates = ["rust-demo"]
gated_pub_doctest = ["rust-demo"]
audit_crates = []
env_roots = []
