# conform.toml — this project's AI-Native discipline policy
# (ENGINE-CONFORM; generated by `typescript-ai-native init`, then owned by you).
#
# The [typescript] table drives the ts-tsc structural gate
# (`typescript-ai-native-conform`): the §8 unsafe-set ban, cell isolation over
# import specifiers, and the file-length budget. Rust-side keys stay
# at their defaults until Rust code joins the tree.

roots = []
max_file_lines = 600

[typescript]
roots = ["src"]
exclude_substrings = ["/fixtures/"]
cells_dir = "src/cells"
seam = "index"
