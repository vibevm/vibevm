[project]
name = "ts-demo"
version = "0.1.0"
authors = ["Oleg Chirukhin"]

[requires.packages]
"stack:org.vibevm/typescript-ai-native" = "^0.5.0"

# The walking skeleton for the TypeScript discipline stack: a REAL
# consumer (its own vibe.toml, its own npm toolchain, the full
# seven-step floor) living inside the vibevm repo for development.
# Install from the in-repo registry:
#   vibe install --registry ../../packages --assume-yes
# The [[registry]] blocks below are the standard defaults; the local
# --registry flag overrides them for the offline dev walk.

[[registry]]
name = "vibespecs"
url = "https://github.com/vibespecs"

[[registry]]
name = "vibespecs-gitverse"
url = "https://gitverse.ru/vibespecs"
naming = "name"
