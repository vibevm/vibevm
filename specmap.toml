# specmap.toml — vibevm's traceability scan + orphan-ratchet policy.
#
# The specmap engine (PROP-014) is config-driven (Traceability Relocation Plan,
# Phase 2): this file is the policy for THIS project — which source roots carry
# taggable code, which markdown trees hold spec units, and which crates are
# exempt from the orphan gate. It supersedes the former specmap-ratchet.json
# (its exempt/dispositioned data folded in here). A consumer of the
# rust-ai-native stack writes its own specmap.toml for its own layout — the
# same posture conform.toml takes (PROP-024; the policy stays with the
# consumer, the engine ships in the package).

# The spec:// namespace this project's units are minted under — the
# `<package>` segment of every `spec://vibevm/…` URI (PROP-014 §2.1).
namespace = "vibevm"

# Code roots scanned for #[spec]/#[verifies]/scope! tags. A `<dir>/*` entry
# scans each subdir of <dir> as one crate; any other entry is a literal dir.
scan_roots = ["crates/*", "xtask"]

# Markdown trees walked for anchored spec units (<root>/**/*.md).
spec_roots = ["spec"]

# Individual root-level spec documents scanned in addition to spec_roots — the
# owner-frozen implementation spec lives at the repo root, outside any spec/
# tree (DBT-0019, closed 2026-06-12 when mdspec began scanning it).
root_spec_docs = ["VIBEVM-SPEC.md"]

# Crates exempt from the orphan ratchet (PLAYBOOK #phase2, flipped 2026-06-10).
# A crate NOT listed is gated: its pub items must carry an own edge or a
# scope!-inherited module edge. Each exemption and why:
#   vibe-graph, vibe-llm  — M0 stub crates, no code yet
#   vibe-wire             — generated code; the JTD schema is the taggable unit
#   xtask                 — internal tooling binary (panics ok at the dev console)
# (specmark + specmark-grammar relocated into stack:org.vibevm/rust-ai-native in
#  the traceability move, so they are no longer vibevm crates to exempt here;
#  the package will trace its own crates in a later phase.)
exempt = [
    "vibe-graph",
    "vibe-llm",
    "vibe-wire",
    "xtask",
]

# Orphans allowed to stand, each carrying its debt id (the "dispositioned into
# debt.json" arm of the Phase 2 acceptance). Empty today — every gated crate's
# public surface is fully tagged.
dispositioned = []

# Installed packages' spec trees, read for URI RESOLUTION only (PROP-014
# §7.1): edges into `spec://discipline-core/…` — the shipped mechanism specs
# this repo's tags cite — resolve through the materialised slot instead of
# dangling. Units found here never enter the committed specmap.json.
[[external_specs]]
namespace = "discipline-core"
root = "vibedeps/flow-discipline-core/0.6.0/spec"
