[package]
name = "wal-workspaces"
group = "org.vibevm.world"
kind = "flow"
version = "0.1.0"
authors = ["Oleg Chirukhin"]
license = "UPL-1.0"
description = "Non-central WALs: register sub-projects (workspaces) inside a host repository, each with its own WAL, cold-resume file, and boot contract; scoped wind-down/resume grammar switches a session into a workspace without loading the host's full boot"
keywords = ["wal", "workspaces", "session", "continuity", "monorepo"]

[compatibility]
min_vibe_version = "0.1.0"
requires_kinds = []

# Extends the canonical WAL convention: each workspace runs the two-file
# model (WAL + cold-resume) that flow:org.vibevm.world/wal defines. Exact pin,
# resolver-safe; publish wal 0.2.0 before this package.
[requires]
packages = { "flow:org.vibevm.world/wal" = "=0.2.0" }

[boot_snippet]
source = "spec/boot/11-flow-wal-workspaces.md"
category = "flow"
