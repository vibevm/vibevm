[package]
name = "redbook"
group = "org.vibevm.world"
kind = "flow"
version = "0.1.0"
authors = ["Oleg Chirukhin"]
license = "UPL-1.0"
description = "The redbook collection: the AI-native development practices, distilled from the book into installable flows — one edition, one tested set"
keywords = ["collection", "practices", "ai-native", "spec-driven", "book"]

[compatibility]
min_vibe_version = "0.1.0"
requires_kinds = []

[boot_snippet]
source = "spec/boot/03-flow-redbook.md"
category = "flow"

# Edition 0.1.0 — the first edition. An edition is a tested set:
# members are pinned exactly, and the umbrella's version is the
# edition number. Members evolve on their own lines between editions.
[requires.packages]
"flow:org.vibevm.world/two-process-model" = "=0.1.0"
"flow:org.vibevm.world/wal" = "=0.2.0"
"flow:org.vibevm.world/sync-from-code" = "=0.1.0"
"flow:org.vibevm.world/git-atomic-commits" = "=0.1.0"
"flow:org.vibevm.world/addressable-specs" = "=0.1.0"
"flow:org.vibevm.world/decision-records" = "=0.1.0"
"flow:org.vibevm.world/conflict-protocol" = "=0.1.0"
"flow:org.vibevm.world/campaign-plans" = "=0.1.0"
"flow:org.vibevm.world/discovery-prompt" = "=0.1.0"
"flow:org.vibevm.world/git-attribution-policy" = "=0.1.0"
