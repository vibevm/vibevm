[package]
name = "redbook"
group = "org.vibevm"
kind = "flow"
version = "0.2.0"
authors = ["Oleg Chirukhin"]
license = "UPL-1.0"
description = "The redbook collection: the AI-native development practices, distilled from the book into installable flows — one edition, one tested set"
keywords = ["collection", "practices", "ai-native", "spec-driven", "book"]

[compatibility]
min_vibe_version = "0.1.0"
requires_kinds = []

[boot_snippet]
source = "spec/boot/03-flow-redbook.md"
category = "flow"

# Edition 0.2.0 — the second edition. An edition is a tested set:
# members are pinned exactly, and the umbrella's version is the
# edition number. Members evolve on their own lines between editions.
# This edition adds the wave-2 practices (operating-modes through
# tool-design-lessons) to the ten of edition 0.1.0.
[requires.packages]
# The book's core (edition 0.1.0)
"flow:org.vibevm/two-process-model" = "=0.1.0"
"flow:org.vibevm/wal" = "=0.2.0"
"flow:org.vibevm/sync-from-code" = "=0.1.0"
"flow:org.vibevm/atomic-commits" = "=0.1.0"
"flow:org.vibevm/addressable-specs" = "=0.1.0"
"flow:org.vibevm/decision-records" = "=0.1.0"
"flow:org.vibevm/conflict-protocol" = "=0.1.0"
"flow:org.vibevm/campaign-plans" = "=0.1.0"
"flow:org.vibevm/discovery-prompt" = "=0.1.0"
"flow:org.vibevm/attribution-policy" = "=0.1.0"
# The project-practice wave (edition 0.2.0)
"flow:org.vibevm/operating-modes" = "=0.1.0"
"flow:org.vibevm/health-audit" = "=0.1.0"
"flow:org.vibevm/manual-tests" = "=0.1.0"
"flow:org.vibevm/secrets-hygiene" = "=0.1.0"
"flow:org.vibevm/licensing" = "=0.1.0"
"flow:org.vibevm/source-mirrors" = "=0.1.0"
"flow:org.vibevm/spec-genres" = "=0.1.0"
"flow:org.vibevm/comparative-research" = "=0.1.0"
"flow:org.vibevm/managed-blocks" = "=0.1.0"
"flow:org.vibevm/qualified-naming" = "=0.1.0"
"flow:org.vibevm/tool-design-lessons" = "=0.1.0"
