# conform.toml — this project's AI-Native discipline policy
# (ENGINE-CONFORM; generated by `rust-ai-native init`, then owned by you).
#
# The gate enforces only what this file gates. Crates start EXEMPT and
# flip into `gated_crates` one by one, each after its violations drain
# to zero (expand-as-you-conform — a flip must never widen a baseline).

roots = ["crates/*"]
exclude_substrings = ["/generated/"]
max_file_lines = 600
# Greenfield adoption (D15, owner directive 2026-07-09): all six crates
# were written conformant and flipped at zero findings on the day the
# workspace was born — the expand-as-you-conform rhythm collapsed to its
# endpoint. A flip must never widen a baseline; the baseline is empty.
gated_crates = [
    "fractality-backend-claude-code",
    "fractality-cli",
    "fractality-core",
    "fractality-initiative",
    "fractality-mc-client",
    "fractality-mission-control",
    "fractality-pod",
]
# Next ratchet (plan Phase 1 ledger): drain the pub-doctest gap crate by
# crate, then flip crates in here too.
gated_pub_doctest = []
audit_crates = []
# Recorded composition surfaces for ambient-environment reads (the
# ambient-env rule's roots). These three files ARE the environment
# protocol, by design, not by accident:
#   home.rs      — the FRACTALITY_HOME / USERPROFILE resolution seam (D4)
#   lib.rs       — FRACTALITY_MC_BIN daemon-binary discovery (D3 autostart)
#   identity.rs  — hostname fallbacks for node identity (D19)
# Everything else threads values in from these roots or from main.
env_roots = [
    "crates/fractality-mc-client/src/home.rs",
    "crates/fractality-mc-client/src/lib.rs",
    "crates/fractality-mission-control/src/identity.rs",
    # The pod's main is the I1 composition root: it snapshots the ambient
    # env ONCE (std::env::vars) and feeds the pure D5 constructor.
    "crates/fractality-pod/src/main.rs",
    # The worker-context seam (Phase 4 nesting): FRACTALITY_RUN_ID is the
    # pod-injected parent pointer a worker's own `fractality spawn`
    # resolves — the environment IS the protocol here, by D5 design.
    "crates/fractality-cli/src/swarm.rs",
    # Same seam, the D18 broker: the MCP server discovers its run from
    # the pod-injected env (FRACTALITY_RUN_ID) — by design.
    "crates/fractality-cli/src/broker.rs",
    # The C2 hook adapter: CLAUDE_ENV_FILE is the harness's own seam
    # for persisting the session export into later Bash calls — the
    # environment IS the protocol here (plan D2/D4).
    "crates/fractality-cli/src/hook.rs",
]
