[package]
name = "typescript-ai-native"
group = "org.vibevm"
kind = "stack"
version = "0.4.0"
authors = ["Oleg Chirukhin"]
license = "EULA"
description = "AI-Native TypeScript - the TypeScript projection of the Discipline v0.2: cells, branding over structural typing, contract-first ordering, the nine scaffolds in TypeScript, tsconfig-as-discipline, the erasure boundary, errors as discriminated unions, type-level testing, and the nine scaffold cards"
keywords = ["typescript", "ai-native", "discipline", "stack"]

[compatibility]
min_vibe_version = "0.1.0"
requires_kinds = []

[requires]
packages = { "flow:org.vibevm/discipline-core" = "^0.4" }

[boot_snippet]
source = "spec/boot/20-stack-typescript-ai-native.md"
category = "stack"

# The operating procedures, as agent-installable skills (PROP-018 §2.4;
# projected by `vibe skill install`). The methods live in
# flow:org.vibevm/discipline-core (04-SWEEP-PLAYBOOK, BROWNFIELD-PROTOCOL);
# these skills are their TypeScript-stack instantiation over the shipped
# discipline-typescript toolchain.
# The shipped tools (PROP-025): `vibe bin build` compiles them in the
# slot; `vibe bin exec <name>` dispatches through the project's lockfile.
[[binary]]
name = "discipline-typescript"
crate = "crates/discipline-cli-typescript"
description = "the umbrella discipline tool for TypeScript: init / floor / conform / specmap / trace / test-gate / tripwire / health / fast-loop / codemod"

[[binary]]
name = "conform-typescript"
crate = "crates/conform-cli-typescript"
description = "the standalone ts-tsc conform gate for TypeScript trees"

[[binary]]
name = "specmap-typescript"
crate = "crates/specmap-cli-typescript"
description = "the standalone traceability index + orphan gate for TypeScript trees"

[[binary]]
name = "tcg-typescript"
crate = "crates/tcg-cli-typescript"
description = "the agentic type oracle: a persistent enriching relay (serve) over the language-service oracle, one-shot validate/scope/complete/type forms, and the bench harness"

[[skill]]
name = "discipline-sweep-typescript"
path = "spec/skills/discipline-sweep-typescript"
description = "The recurring AI-Native discipline sweep for TypeScript: the seven-step floor, then the health collector's ratchet items"

[[skill]]
name = "terraform-typescript"
path = "spec/skills/terraform-typescript"
description = "Adopt the AI-Native discipline on an existing TypeScript codebase: inventory-not-gate, the registries, characterization, then card raids cell by cell"
