# mcp:org.vibevm/typescript-ai-native-mcp — the AI-Native TypeScript
# discipline served over MCP (PROP-027; MCP-SOVEREIGNTY-PLAN Wave 4).
# One authored crate — the server — over a vendored closure that
# mirrors the stack's crates/ LAYOUT (stack crates at crates/<name>,
# neutral engines at crates/vendor/<name>) so relative path-deps hold
# verbatim; the vibe.toml `=0.4.0` pin holds these copies and the
# consumer's installed stack to ONE resolved version set. Never edit a
# vendored crate here — the fix surface is its authored home.
[workspace]
resolver = "3"
members = [
    "crates/typescript-ai-native-mcp",
    "crates/typescript-ai-native-conform-frontend",
    "crates/typescript-ai-native-conform",
    "crates/typescript-ai-native-cli",
    "crates/typescript-ai-native-specmap-scan",
    "crates/typescript-ai-native-specmap",
    "crates/typescript-ai-native-extract-bridge",
    "crates/typescript-ai-native-tcg-bridge",
    "crates/typescript-ai-native-tcg",
    "crates/vendor/core-ai-native-conform",
    "crates/vendor/core-ai-native-mcp",
    "crates/vendor/core-ai-native-specmap",
    "crates/vendor/core-ai-native-specmark",
    "crates/vendor/core-ai-native-specmark-grammar",
]

[workspace.package]
version = "0.6.0"
edition = "2024"
rust-version = "1.93"
authors = ["Oleg Chirukhin"]
license-file = "LICENSE.md"
publish = false
repository = "https://gitverse.ru/anarchic/vibevm"
homepage = "https://gitverse.ru/anarchic/vibevm"

[workspace.dependencies]
# Internal crates — path-only; every one below is a vendored
# write-through (see the workspace header).
conform-core = { package = "core-ai-native-conform", path = "crates/vendor/core-ai-native-conform" }
typescript-ai-native-conform-frontend = { path = "crates/typescript-ai-native-conform-frontend" }
typescript-ai-native-conform = { path = "crates/typescript-ai-native-conform" }
typescript-ai-native-cli = { path = "crates/typescript-ai-native-cli" }
mcp-core = { package = "core-ai-native-mcp", path = "crates/vendor/core-ai-native-mcp" }
specmap-core = { package = "core-ai-native-specmap", path = "crates/vendor/core-ai-native-specmap" }
typescript-ai-native-specmap-scan = { path = "crates/typescript-ai-native-specmap-scan" }
typescript-ai-native-specmap = { path = "crates/typescript-ai-native-specmap" }
specmark = { package = "core-ai-native-specmark", path = "crates/vendor/core-ai-native-specmark" }
specmark-grammar = { package = "core-ai-native-specmark-grammar", path = "crates/vendor/core-ai-native-specmark-grammar" }
typescript-ai-native-tcg-bridge = { path = "crates/typescript-ai-native-tcg-bridge" }
typescript-ai-native-tcg = { path = "crates/typescript-ai-native-tcg" }
typescript-ai-native-extract-bridge = { path = "crates/typescript-ai-native-extract-bridge" }

# Third-party (all permissive licenses — PROP-000 §3). Feature sets
# match the stack's so the vendored crates build identically here.
anyhow = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
sha2 = "0.10"
toml = "0.9"
walkdir = "2"
glob = "0.3"
syn = { version = "2", features = ["full", "visit"] }
quote = "1"
proc-macro2 = { version = "1", features = ["span-locations"] }
clap = { version = "4", features = ["derive"] }

# Dev / test
tempfile = "3"
