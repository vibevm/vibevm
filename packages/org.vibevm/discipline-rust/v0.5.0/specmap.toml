# specmap.toml — discipline-rust's own traceability policy.
#
# Self-trace duty covers the ONE authored crate (the server); every
# other crate here is a byte-identical vendored copy gated in its
# authored home (discipline-core / rust-ai-native — sync-engines holds
# the bytes equal). Orphan-coverage gate only (`specmap-rust --gate`):
# the scope! targets include cross-package units (MCP-CORE, PROP-027),
# so a committed index would be part-dangling noise; what matters is
# that no server code drifts untagged.

namespace = "discipline-rust"

scan_roots = ["crates/discipline-mcp-rust"]

spec_roots = ["spec"]

root_spec_docs = []

exempt = []

dispositioned = []
