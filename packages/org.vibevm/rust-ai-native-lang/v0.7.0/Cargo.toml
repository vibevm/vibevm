# org.vibevm/rust-ai-native — a code-bearing package (PROP-024). It ships the
# ENGINE-CONFORM toolchain as runnable Rust, not only prompts: install the
# stack and you get the `conform` gate, not a description of it. This is the
# package's OWN Cargo workspace; vibevm consumes these crates by external
# path-dep (the vibevm root excludes packages/ + vibedeps/, PROP-024 §2.4).
#
# The policy stays with the CONSUMER — this package ships the engine, and each
# project writes its own conform.toml (TERRAFORM-PLAN-v0.3 §30; PROP-024 §2.2).
[workspace]
resolver = "3"
members = [
    "crates/rust-ai-native-conform-frontend",
    "crates/rust-ai-native-conform",
    "crates/rust-ai-native-cli",
    "crates/rust-ai-native-env-audit",
    "crates/rust-ai-native-tcg-bridge",
    "crates/rust-ai-native-tcg",
    "crates/rust-ai-native-specmap",
    "crates/vendor/core-ai-native-conform",
    "crates/vendor/core-ai-native-specmap",
    "crates/vendor/core-ai-native-specmark",
    "crates/vendor/core-ai-native-specmark-grammar",
]

[workspace.package]
version = "0.7.0"
edition = "2024"
rust-version = "1.93"
authors = ["Oleg Chirukhin"]
license-file = "LICENSE.md"
publish = false
repository = "https://gitverse.ru/anarchic/vibevm"
homepage = "https://gitverse.ru/anarchic/vibevm"

[workspace.dependencies]
# Internal crates — path-only (not published; consumed in-tree). The four
# neutral engine crates under crates/vendor/ are byte-identical vendored
# copies of flow:org.vibevm/core-ai-native's authored source (`cargo xtask
# sync-engines`; the --check gate runs in self-check). Never edit them here —
# the fix surface is the authored copy in discipline-core.
conform-core = { package = "core-ai-native-conform", path = "crates/vendor/core-ai-native-conform" }
rust-ai-native-conform-frontend = { path = "crates/rust-ai-native-conform-frontend" }
rust-ai-native-conform = { path = "crates/rust-ai-native-conform" }
specmap-core = { package = "core-ai-native-specmap", path = "crates/vendor/core-ai-native-specmap" }
rust-ai-native-specmap = { path = "crates/rust-ai-native-specmap" }
specmark = { package = "core-ai-native-specmark", path = "crates/vendor/core-ai-native-specmark" }
specmark-grammar = { package = "core-ai-native-specmark-grammar", path = "crates/vendor/core-ai-native-specmark-grammar" }

# Third-party (all permissive licenses — PROP-000 §3). Feature sets match
# vibevm's so the engine behaves identically wherever it is built.
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
sha2 = "0.10"
toml = "0.9"
walkdir = "2"
glob = "0.3"
syn = { version = "2", features = ["full", "visit"] }
quote = "1"
proc-macro2 = { version = "1", features = ["span-locations"] }
clap = { version = "4", features = ["derive"] }

thiserror = "2"

# Dev / test
tempfile = "3"
