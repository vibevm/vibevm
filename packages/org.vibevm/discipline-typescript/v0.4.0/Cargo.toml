# mcp:org.vibevm/discipline-typescript — the AI-Native TypeScript
# discipline served over MCP (PROP-027; MCP-SOVEREIGNTY-PLAN Wave 4).
# One authored crate — the server — over a vendored closure that
# mirrors the stack's crates/ LAYOUT (stack crates at crates/<name>,
# neutral engines at crates/vendor/<name>) so relative path-deps hold
# verbatim; the vibe.toml `=0.4.0` pin holds these copies and the
# consumer's installed stack to ONE resolved version set. Never edit a
# vendored crate here — the fix surface is its authored home.
[workspace]
resolver = "3"
members = [
    "crates/discipline-mcp-typescript",
    "crates/conform-frontend-typescript",
    "crates/conform-cli-typescript",
    "crates/discipline-cli-typescript",
    "crates/specmap-scan-typescript",
    "crates/specmap-cli-typescript",
    "crates/ts-extract-bridge",
    "crates/tcg-oracle-bridge",
    "crates/tcg-cli-typescript",
    "crates/vendor/conform-core",
    "crates/vendor/mcp-core",
    "crates/vendor/specmap-core",
    "crates/vendor/specmark",
    "crates/vendor/specmark-grammar",
]

[workspace.package]
version = "0.4.0"
edition = "2024"
rust-version = "1.93"
authors = ["Oleg Chirukhin"]
license-file = "LICENSE.md"
publish = false
repository = "https://gitverse.ru/anarchic/vibevm"
homepage = "https://gitverse.ru/anarchic/vibevm"

[workspace.dependencies]
# Internal crates — path-only; every one below is a vendored
# write-through (see the workspace header).
conform-core = { path = "crates/vendor/conform-core" }
conform-frontend-typescript = { path = "crates/conform-frontend-typescript" }
conform-cli-typescript = { path = "crates/conform-cli-typescript" }
discipline-cli-typescript = { path = "crates/discipline-cli-typescript" }
mcp-core = { path = "crates/vendor/mcp-core" }
specmap-core = { path = "crates/vendor/specmap-core" }
specmap-scan-typescript = { path = "crates/specmap-scan-typescript" }
specmap-cli-typescript = { path = "crates/specmap-cli-typescript" }
specmark = { path = "crates/vendor/specmark" }
specmark-grammar = { path = "crates/vendor/specmark-grammar" }
tcg-oracle-bridge = { path = "crates/tcg-oracle-bridge" }
tcg-cli-typescript = { path = "crates/tcg-cli-typescript" }
ts-extract-bridge = { path = "crates/ts-extract-bridge" }

# Third-party (all permissive licenses — PROP-000 §3). Feature sets
# match the stack's so the vendored crates build identically here.
anyhow = "1"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
sha2 = "0.10"
toml = "0.9"
walkdir = "2"
glob = "0.3"
syn = { version = "2", features = ["full", "visit"] }
quote = "1"
proc-macro2 = { version = "1", features = ["span-locations"] }
clap = { version = "4", features = ["derive"] }

# Dev / test
tempfile = "3"
