# discipline-cli — the umbrella `discipline-rust` binary (PROP-024
# code-bearing packages; SELF-SUFFICIENCY-PLAN Phase 3): one shipped entry
# point for everything the Discipline's procedures run — bootstrap (init),
# the portable verification floor, the two engines (conform/specmap), and
# the sweep/brownfield tooling (test-gate, tripwire, trace, health,
# fast-loop, codemod). The library half is what a project-local wrapper
# (e.g. a dev repo's task runner) delegates to.
[package]
name = "discipline-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license-file.workspace = true
publish.workspace = true
repository.workspace = true
homepage.workspace = true

[[bin]]
name = "discipline-rust"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
clap.workspace = true
serde_json.workspace = true
toml.workspace = true
conform-core.workspace = true
conform-frontend-rust.workspace = true
conform-cli.workspace = true
specmap-core.workspace = true
specmap-cli.workspace = true

[dev-dependencies]
tempfile.workspace = true
