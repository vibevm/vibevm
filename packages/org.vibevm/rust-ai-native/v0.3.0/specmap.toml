# specmap.toml — the rust-ai-native package's own traceability policy.
#
# The package ships the specmap engine and now traces ITSELF (Traceability
# Relocation Plan, Phase 4): the discipline disciplines itself again. Run it as
# `specmap-rust --gate --path <this package>` — the orphan-coverage gate only.
#
# Why gate-only, not the full --check index: the `scope!` tags on these crates
# cite spec://discipline-core/mechanisms/{ENGINE-CONFORM,PROP-014,…} units that
# ship in flow:org.vibevm/discipline-core — a SIBLING package this tree cannot
# see (a consumer resolves them via its own [[external_specs]] over the
# materialised vibedeps/; the dev repo proves that). On the package tree alone
# every edge is cross-package "dangling", so a committed specmap.json would be
# noise. What is meaningful — and what this gates — is coverage: every gated
# crate's public surface carries a scope!/#[spec] tag, so no discipline code
# drifts untagged.

# The spec:// namespace for units under this package's own spec/ tree.
namespace = "rust-ai-native"

# Code roots scanned for tags. The package has no xtask — just its crates/.
scan_roots = ["crates/*"]

# The package's prompt content (guides, cards, boot). Irrelevant to the orphan
# gate (which reads code edges, not spec units), but named for completeness.
spec_roots = ["spec"]

# No repo-root spec document here (the consumer hosts VIBEVM-SPEC.md).
root_spec_docs = []

# Crates exempt from the orphan gate:
#   conform-cli, specmap-cli   — CLI driver binaries (the `conform-rust` /
#                                `specmap-rust` entry points), exempt like
#                                vibevm exempts its own xtask tooling
#   specmark, specmark-grammar — the tag bootstrap pair: they cannot depend on
#                                specmark to carry scope! markers on themselves
exempt = [
    "conform-cli",
    "specmap-cli",
    "specmark",
    "specmark-grammar",
]

dispositioned = []
