# org.vibevm.ai-native/go-ai-native-mcp — the Go discipline served over
# MCP (PROP-027). This package vendors the stack's toolchain crates
# byte-identically (the exact-pin law: `=0.1.0` on
# stack:org.vibevm.ai-native/go-ai-native-lang holds the vendored engines
# and the consumer's installed gates to ONE resolved version set) plus
# the neutral mcp-core transport. Never edit vendored copies — the fix
# surface is the authored crate in the stack / core package.
[workspace]
resolver = "3"
members = [
    "crates/go-ai-native-mcp",
    "crates/go-ai-native-cli",
    "crates/go-ai-native-conform",
    "crates/go-ai-native-conform-frontend",
    "crates/go-ai-native-extract-bridge",
    "crates/go-ai-native-specmap",
    "crates/go-ai-native-specmap-scan",
    "crates/go-ai-native-tcg",
    "crates/go-ai-native-tcg-bridge",
    "crates/vendor/core-ai-native-conform",
    "crates/vendor/core-ai-native-mcp",
    "crates/vendor/core-ai-native-specmap",
    "crates/vendor/core-ai-native-specmark",
    "crates/vendor/core-ai-native-specmark-grammar",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
authors = ["Oleg Chirukhin"]
license-file = "LICENSE.md"
publish = false
repository = "https://gitverse.ru/vibevm/vibevm"
homepage = "https://gitverse.ru/vibevm/vibevm"

[workspace.dependencies]
# Internal crates — path-only (not published; consumed in-tree).
conform-core = { package = "core-ai-native-conform", path = "crates/vendor/core-ai-native-conform" }
specmap-core = { package = "core-ai-native-specmap", path = "crates/vendor/core-ai-native-specmap" }
specmark = { package = "core-ai-native-specmark", path = "crates/vendor/core-ai-native-specmark" }
specmark-grammar = { package = "core-ai-native-specmark-grammar", path = "crates/vendor/core-ai-native-specmark-grammar" }
mcp-core = { package = "core-ai-native-mcp", path = "crates/vendor/core-ai-native-mcp" }
go-ai-native-extract-bridge = { path = "crates/go-ai-native-extract-bridge" }
go-ai-native-conform-frontend = { path = "crates/go-ai-native-conform-frontend" }
go-ai-native-conform = { path = "crates/go-ai-native-conform" }
go-ai-native-specmap-scan = { path = "crates/go-ai-native-specmap-scan" }
go-ai-native-specmap = { path = "crates/go-ai-native-specmap" }
go-ai-native-cli = { path = "crates/go-ai-native-cli" }
go-ai-native-tcg-bridge = { path = "crates/go-ai-native-tcg-bridge" }
go-ai-native-tcg = { path = "crates/go-ai-native-tcg" }

# Third-party (all permissive — PROP-000 §3); feature sets match the
# stack's so the engines behave identically wherever built.
anyhow = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
sha2 = "0.10"
toml = "0.9"
walkdir = "2"
glob = "0.3"
syn = { version = "2", features = ["full", "visit"] }
quote = "1"
proc-macro2 = { version = "1", features = ["span-locations"] }

# Dev / test
tempfile = "3"
