<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- rounded-square gradient tile background (shared across the app-family icons) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2A32"/>
      <stop offset="1" stop-color="#161619"/>
    </linearGradient>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
  <!-- node-graph figure (muted emerald) -->
  <g transform="translate(64 64) scale(12)">
    <line x1="16" y1="16" x2="7"  y2="7"  stroke="#5FB584" stroke-width="2" opacity="0.55"/>
    <line x1="16" y1="16" x2="26" y2="9"  stroke="#5FB584" stroke-width="2" opacity="0.55"/>
    <line x1="16" y1="16" x2="9"  y2="25" stroke="#5FB584" stroke-width="2" opacity="0.55"/>
    <line x1="16" y1="16" x2="25" y2="24" stroke="#5FB584" stroke-width="2" opacity="0.55"/>
    <circle cx="16" cy="16" r="5" fill="#5FB584"/>
    <circle cx="7"  cy="7"  r="3" fill="#14120E" stroke="#5FB584" stroke-width="2"/>
    <circle cx="26" cy="9"  r="3" fill="#14120E" stroke="#5FB584" stroke-width="2"/>
    <circle cx="9"  cy="25" r="3" fill="#14120E" stroke="#5FB584" stroke-width="2"/>
    <circle cx="25" cy="24" r="3" fill="#14120E" stroke="#5FB584" stroke-width="2"/>
  </g>
</svg>
