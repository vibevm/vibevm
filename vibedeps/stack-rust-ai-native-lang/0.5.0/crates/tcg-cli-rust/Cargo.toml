# tcg-cli-rust — bin `tcg-rust`: the persistent enriching relay
# (`serve`) an MCP host drives, the one-shot validate/scope/complete/
# type forms, and the differential/latency bench harness
# (TCG-PROTOCOL-RUST v0.1; AGENTIC-TCG-RUST-PLAN D4–D6). Enrichment is
# IN-PROCESS: the gate's own rule assembly over the gate's own fact
# extractor — no second engine, no drift.
