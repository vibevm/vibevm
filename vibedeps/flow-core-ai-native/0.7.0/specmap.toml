# specmap.toml — core-ai-native's own traceability policy.
#
# Since 0.4.0 this package AUTHORS the neutral engine crates (the vendor-sync
# consolidation, DEFERRALS-CLOSEOUT-PLAN v0.1 D1/Phase 1), so the self-trace
# duty moves here with them: run `rust-ai-native-specmap --gate --path <this package>`
# (the binary ships in stack:org.vibevm.ai-native/rust-ai-native-lang; the gate is engine
# code, which lives HERE). Orphan-coverage gate only — the scope! tags on
# these crates cite this package's own spec/mechanisms/ units AND
# vibevm-hosted units, so a committed index would be part-dangling noise on
# the package tree alone; what matters is that no engine code drifts
# untagged (the Traceability Relocation Phase 4 posture, inherited).

# The spec:// namespace for units under this package's own spec/ tree.
namespace = "core-ai-native"

# Code roots scanned for tags: the four authored engine crates.
scan_roots = ["crates/*"]

# The Discipline corpus (manifesto, cards format, playbooks, mechanisms).
spec_roots = ["spec"]

# No repo-root spec document here (the consumer hosts VIBEVM-SPEC.md).
root_spec_docs = []

# Crates exempt from the orphan gate:
#   core-ai-native-specmark, core-ai-native-specmark-grammar — the tag
#                                bootstrap pair: they cannot depend on
#                                specmark to carry scope! markers on
#                                themselves
exempt = [
    "core-ai-native-specmark",
    "core-ai-native-specmark-grammar",
]

dispositioned = []
